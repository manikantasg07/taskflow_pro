services:
  redis:
    image: redis:7-alpine       
    ports:
      - "${REDIS_PORT}:6379"
    restart: unless-stopped

  server:
    build:
      context: ./server
    ports:
      - "${SERVER_PORT}:3000"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      NODE_ENV: ${NODE_ENV}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:${REDIS_PORT}
    depends_on:
      - redis
    restart: unless-stopped